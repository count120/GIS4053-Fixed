    You will need to use:
        - The Console tab: shows JavaScript errors with line numbers and descriptions.
        - The Elements tab: shows the actual HTML structure of the page as the browser sees it. 
          You can also see the CSS styles applied to any element here.

    When the map is working correctly, you should see:
        1. A title ("A Working Web Map") and subtitle visible at the top of the page
        2. A map with a red border around it showing the the UMD campus
        3. A basemap using OpenStreetMap tiles (not a blank grey box)

    Tips:
        - Fix the bugs one at a time. After each fix, save the file, refresh the page, and check the console again.
        - Read the error messages carefully — they usually tell you exactly what's wrong and on which line.
        - If something looks wrong visually but there's no console error, try using the Elements tab to inspect the element.

    For each bug that you find and fix, leave a comment in the code describing:
        - What was the problem?

        - How did you fix it?

    <!-- 
Bug 6 — Wrong CSS selector for map
Problem: I used .map but the div uses id="map", so the style didn’t apply.
Tool used: Elements tab.
Fix: Changed .map to #map.

    <!-- Header at the top of the page -->
    <div class="header">
        <h1>A Working Web Map</h1>
            <h2>University of Minnesota Duluth</h2>

    </div>
    
    <div id="map" style="width: 600px; height: 400px;"></div>

    <!-- 
Bug 4 — Leaflet loaded after the script
Problem: My code was running before Leaflet loaded, so it said "L is not defined".
Tool used: Console.
Fix: Moved the Leaflet script above my JS code.
-->

     <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <!-- start of our JavaScript code -->
    <script>
        // Initialize the map
        let map = L.map('map')
       
//Bug 1 — Wrong map element ID
//Problem: The JS said 'mapElement' but the div was just 'map', so it couldn’t find it.
//Tool used: Console (it showed an error about not finding the element).
//Fix: Changed 'mapElement' to 'map' so they match.

        // Center the map on UMD campus, and set the zoom level
     
//Bug 2 — Latitude and longitude were swapped
//Problem: The coordinates were backwards so the map wasn’t centered right.
//Tool used: Just noticing the location looked wrong + knowing lat comes first.
//Fix: Switched it to [46.82, -92.08].

        map.setView([46.82, -92.08], 15); 
            
        // Add OpenStreetMap tiles
     
//Bug 3 — Typo in the tile URL
//Problem: There was an extra "g" in openstreetmap.orgg so the tiles wouldn’t load.
//Tool used: Network tab (tiles were failing).
//Fix: Fixed the spelling to openstreetmap.org.

        const tiles = L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>'
        }).addTo(map);
    </script>
        
    <!-- Leaflet JavaScript library -->
